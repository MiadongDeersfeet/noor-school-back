spring:
  application:
    name: noorschool-back

  config:
    import: optional:classpath:application-private.yml

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:}
            client-secret: ${GOOGLE_CLIENT_SECRET:}
            scope:
              - profile
              - email
        provider:
          google:
            user-name-attribute: sub

server:
  port: ${PORT:8080}
  address: 0.0.0.0

app:
  auth:
    cors:
      allowed-origins: ${AUTH_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174}
    cookie:
      refresh-cookie-name: ${AUTH_REFRESH_COOKIE_NAME:NS_REFRESH_TOKEN}
      secure: ${AUTH_COOKIE_SECURE:false}
      same-site: ${AUTH_COOKIE_SAME_SITE:Lax}
      domain: ${AUTH_COOKIE_DOMAIN:}
    oauth2:
      success-redirect-uri: ${OAUTH2_SUCCESS_REDIRECT_URI:http://localhost:5173/auth/callback}
      failure-redirect-uri: ${OAUTH2_FAILURE_REDIRECT_URI:http://localhost:5173/auth/callback}
    jwt:
      issuer: ${JWT_ISSUER:noorschool}
      secret: ${JWT_SECRET:change-this-secret-at-least-32-characters}
      access-token-expiration-seconds: ${JWT_ACCESS_TOKEN_EXP_SECONDS:3600}
      refresh-token-expiration-seconds: ${JWT_REFRESH_TOKEN_EXP_SECONDS:1209600}

mybatis:
  mapper-locations: classpath:/mapper/**/*.xml
  type-aliases-package: com.noorschool
  configuration:
    map-underscore-to-camel-case: true

logging:
  level:
    com.noorschool: debug