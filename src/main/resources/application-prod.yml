spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: oracle.jdbc.OracleDriver

# OAuth2
GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}

# JWT
JWT_SECRET: ${JWT_SECRET}

# Production overrides
AUTH_ALLOWED_ORIGINS: ${AUTH_ALLOWED_ORIGINS}
AUTH_COOKIE_SECURE: ${AUTH_COOKIE_SECURE:true}
AUTH_COOKIE_SAME_SITE: ${AUTH_COOKIE_SAME_SITE:None}
AUTH_COOKIE_DOMAIN: ${AUTH_COOKIE_DOMAIN}
OAUTH2_SUCCESS_REDIRECT_URI: ${OAUTH2_SUCCESS_REDIRECT_URI}
OAUTH2_FAILURE_REDIRECT_URI: ${OAUTH2_FAILURE_REDIRECT_URI}

logging:
  level:
    com.noorschool: info
